<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuários</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="formulario">
        <div class="cabecalho textoPadrao">
            <p>Registrar</p>
        </div>
        <form>
                
                <input class="campos-formulario textoPadrao" placeholder="Nome" id="nome" required/>        
                <input class="campos-formulario textoPadrao" placeholder="Telefone" id="telefone" required/>            
                <input class="campos-formulario textoPadrao" placeholder="Endereço" id="endereco" required/>        
                <input class="campos-formulario textoPadrao" placeholder="Instagram" id="instagram" required/>            
            
            <div class="botoesDiv">
                <button class="botoes textoPadrao" onclick="validar()" type="button">Salvar</button>
            </div>
        </form>
    </div>
    <div>
        <table class="textoPadrao tabelaContatos" id="tabela">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Endereço</th>
                    <th>Instagram</th> 
                </tr>    
            </thead>
            <tbody id = "corpoTabela">
                <tr>
                    <td>1</td>
                    <td>2</td>
                    <td>3</td>
                    <td>4</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
<script src="../js/index.js"></script>
</html>
